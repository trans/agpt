# Model configurations for microgpt
# Run with: bin/microgpt data/input.txt --config models.yml --run <id>

# --- Cooperative ensembles ---

coop-4e:
  mode: cooperative
  experts: "d64n1,d64n2,d64n3,d64n4"
  stream_dim: 64
  counter: true
  steps: 10000
  backend: openblas

coop-4e-narrow16:
  mode: cooperative
  experts: "d64n1,d64n2,d64n3,d64n4"
  stream_dim: 64
  active_dims: 16
  counter: true
  steps: 5000
  backend: openblas

coop-4e-narrow32:
